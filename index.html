<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdGuardAI Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>CrowdGuardAI Dashboard</h1>
    <p class="subtitle">Live Crowd Monitoring & Intelligent Rerouting</p>

    <div class="card">
        <h2>People Count</h2>
        <p id="people">18</p>
    </div>

    <div class="card">
        <h2>Crowded Zone</h2>
        <p id="zone">Center Corridor</p>
    </div>

    <div class="card">
        <h2>Predicted Congestion</h2>
        <p id="time">10 seconds</p>
    </div>

    <div class="card">
        <h2>Suggested Route</h2>
        <p id="route">Left Exit</p>
    </div>

    <div class="card">
        <h2>Congestion Reduced</h2>
        <p id="reduction">28%</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
